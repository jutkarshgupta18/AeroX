<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Authentication — AerialView Detector Pro</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
	<style>
		:root {
			--red: #FF2D2D;
			--red2: #FF6B35;
			--cyan: #00D4FF;
			--teal: #00FFB3;
			--gold: #FFD700;
			--violet: #B44FFF;
			--bg: #060810;
			--bg2: #0C0F1A;
			--bg3: #121626;
			--panel: #0F1320;
			--glass: rgba(255, 255, 255, 0.04);
			--glass2: rgba(255, 255, 255, 0.08);
			--border: rgba(255, 255, 255, 0.08);
			--border2: rgba(255, 255, 255, 0.14);
			--text: #E2E8F0;
			--muted: #64748B;
			--faint: #2A3042;
			--font: 'Inter', system-ui, sans-serif;
			--mono: 'JetBrains Mono', monospace;
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			font-family: var(--font);
			background: var(--bg);
			color: var(--text);
			overflow: hidden;
			min-height: 100vh;
		}

		#bg-canvas {
			position: fixed;
			inset: 0;
			z-index: 0;
			pointer-events: none;
		}

		.page-scan {
			position: fixed;
			inset: 0;
			z-index: 1;
			pointer-events: none;
			overflow: hidden;
		}

		.page-scan::before {
			content: '';
			position: absolute;
			left: 0;
			right: 0;
			height: 2px;
			background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
			animation: scanDown 8s linear infinite;
			top: -2px;
		}

		@keyframes scanDown {
			0% {
				top: -2px
			}

			100% {
				top: 100%
			}
		}

		.page-grid {
			position: fixed;
			inset: 0;
			z-index: 1;
			pointer-events: none;
			background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
			background-size: 60px 60px;
			mask-image: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.3) 30%, rgba(0, 0, 0, 0.3) 70%, transparent 100%);
		}

		/* NAV */
		.nav {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			z-index: 1000;
			height: 62px;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 40px;
			background: rgba(6, 8, 16, 0.7);
			backdrop-filter: blur(20px);
			border-bottom: 1px solid var(--border);
		}

		.nav-brand {
			display: flex;
			align-items: center;
			gap: 12px;
			text-decoration: none;
		}

		.nav-badge {
			width: 36px;
			height: 36px;
			border-radius: 10px;
			background: linear-gradient(135deg, var(--red), var(--red2));
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 16px;
			box-shadow: 0 0 20px rgba(255, 45, 45, 0.4);
		}

		.nav-title {
			font-size: 16px;
			font-weight: 700;
			color: #fff;
			letter-spacing: -0.02em;
		}

		/* AUTH CARD */
		.auth-container {
			position: relative;
			z-index: 2;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 100px 24px 60px;
		}

		.auth-card {
			width: 400px;
			background: rgba(12, 15, 26, 0.75);
			backdrop-filter: blur(28px);
			-webkit-backdrop-filter: blur(28px);
			border: 1px solid var(--border);
			border-radius: 24px;
			padding: 40px;
			position: relative;
			overflow: hidden;
			box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
		}

		#chk {
			display: none;
		}

		.form-container {
			width: 100%;
			transition: 0.8s ease-in-out;
		}

		.register {
			margin-bottom: 20px;
		}

		.login {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(12, 15, 26, 0.9);
			backdrop-filter: blur(28px);
			-webkit-backdrop-filter: blur(28px);
			padding: 40px;
			border-radius: 60% / 10%;
			transform: translateY(500px);
			transition: 0.8s ease-in-out;
		}

		.login label {
			color: #fff;
			transform: scale(0.6);
		}

		.register label {
			color: #fff;
		}

		label {
			font-size: 2.2rem;
			font-weight: 900;
			color: #fff;
			display: flex;
			justify-content: center;
			margin-bottom: 30px;
			cursor: pointer;
			transition: 0.5s ease;
			letter-spacing: -0.03em;
		}

		input {
			width: 100%;
			padding: 14px 18px;
			border-radius: 12px;
			border: 1px solid var(--border);
			background: rgba(255, 255, 255, 0.05);
			color: #fff;
			font-family: var(--mono);
			font-size: 13px;
			margin-bottom: 12px;
			outline: none;
			transition: 0.2s;
		}

		input:focus {
			border-color: var(--cyan);
			background: rgba(255, 255, 255, 0.08);
		}

		.login input {
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid var(--border);
			color: #fff;
		}

		.login input:focus {
			border-color: var(--cyan);
			background: rgba(255, 255, 255, 0.08);
		}

		button {
			width: 100%;
			padding: 16px;
			border-radius: 12px;
			border: none;
			background: linear-gradient(135deg, var(--red), var(--red2));
			color: #fff;
			font-size: 14px;
			font-weight: 700;
			cursor: pointer;
			transition: 0.3s;
			margin-top: 10px;
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}

		button:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 30px rgba(255, 45, 45, 0.4);
		}

		.login button {
			background: linear-gradient(135deg, var(--red), var(--red2));
		}

		.login button:hover {
			background: #000;
		}

		#chk:checked~.login {
			transform: translateY(110px);
			border-radius: 0;
		}

		#chk:checked~.login label {
			transform: scale(1);
		}

		#chk:checked~.register label {
			transform: scale(0.6);
		}

		/* FLASH MESSAGES */
		.flashes {
			list-style: none;
			margin-bottom: 20px;
			width: 400px;
			z-index: 10;
			position: relative;
		}

		.flashes li {
			padding: 14px 20px;
			border-radius: 12px;
			margin-bottom: 10px;
			font-size: 13px;
			font-weight: 600;
			display: flex;
			align-items: center;
			gap: 10px;
			animation: fadeUp 0.4s ease;
		}

		.flashes li.error {
			background: rgba(255, 45, 45, 0.15);
			border: 1px solid rgba(255, 45, 45, 0.3);
			color: #ff8080;
		}

		.flashes li.success {
			background: rgba(0, 255, 179, 0.1);
			border: 1px solid rgba(0, 255, 179, 0.3);
			color: #80ffcf;
		}

		@keyframes fadeUp {
			from {
				opacity: 0;
				transform: translateY(10px);
			}

			to {
				opacity: 1;
				transform: none;
			}
		}
	</style>
</head>

<body>
	<canvas id="bg-canvas"></canvas>
	<div class="page-scan"></div>
	<div class="page-grid"></div>

	<nav class="nav">
		<a class="nav-brand" href="/">
			<div class="nav-badge">🛰</div>
			<span class="nav-title">AerialView Pro</span>
		</a>
	</nav>

	<div class="auth-container">
		{% with messages = get_flashed_messages(with_categories=true) %}
		{% if messages %}
		<ul class="flashes">
			{% for category, message in messages %}
			<li class="{{ category }}">
				<i class="fas fa-{% if category == 'error' %}exclamation-circle{% else %}check-circle{% endif %}"></i>
				{{ message }}
			</li>
			{% endfor %}
		</ul>
		{% endif %}
		{% endwith %}

		<div class="auth-card">
			<input type="checkbox" id="chk" aria-hidden="true" {% if request.args.get('mode')=='login' %}checked{% endif
				%}>

			<div class="register">
				<form method="POST" action="/register">
					<label for="chk" aria-hidden="true">Sign Up</label>
					<input type="text" name="name" placeholder="Full Name" required="">
					<input type="email" name="email" placeholder="Email Address" required="">
					<input type="password" name="password" placeholder="Password" required="">
					<input type="password" name="confirm_password" placeholder="Confirm Password" required="">
					<button type="submit">Create Account</button>
					<p style="text-align:center; font-size:12px; color:var(--muted); margin-top:15px;">Already have an
						account? <label for="chk"
							style="display:inline; font-size:12px; color:var(--cyan); font-weight:600; margin-bottom:0;">Log
							In</label></p>
				</form>
			</div>

			<div class="login">
				<form method="POST" action="/login">
					<label for="chk" aria-hidden="true">Log In</label>
					<input type="email" name="email" placeholder="Email Address" required="">
					<input type="password" name="password" placeholder="Password" required="">
					<button type="submit">Access Pro</button>
					<p style="text-align:center; font-size:12px; color:#64748b; margin-top:15px;">New to AerialView?
						<label for="chk"
							style="display:inline; font-size:12px; color:var(--cyan); font-weight:600; margin-bottom:0;">Create
							Account</label>
					</p>
				</form>
			</div>
		</div>
	</div>

	<script>
		(function () {
			const c = document.getElementById('bg-canvas'), ctx = c.getContext('2d');
			function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
			resize(); window.addEventListener('resize', resize);
			const pts = Array.from({ length: 70 }, () => ({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, r: Math.random() * 1.5 + 0.3, vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25, a: Math.random() * 0.35 + 0.05, hue: Math.random() < 0.6 ? 185 : Math.random() < 0.5 ? 10 : 145 }));
			function draw() { ctx.clearRect(0, 0, c.width, c.height); pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `hsla(${p.hue},90%,65%,${p.a})`; ctx.fill(); p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > c.width) p.vx *= -1; if (p.y < 0 || p.y > c.height) p.vy *= -1; }); for (let i = 0; i < pts.length; i++)for (let j = i + 1; j < pts.length; j++) { const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy); if (d < 90) { ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.strokeStyle = `rgba(0,212,255,${0.06 * (1 - d / 90)})`; ctx.lineWidth = 0.4; ctx.stroke(); } } requestAnimationFrame(draw); }
			draw();
		})();
	</script>
</body>

</html>
